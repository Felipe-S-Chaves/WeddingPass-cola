<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Pass - Recepção</title>
    <link rel="icon"
        href="https://img.freepik.com/vetores-gratis/ilustra-o-de-desenho-animado-de-anel-de-diamante-desenhado_23-2150903776.jpg?semt=ais_hybrid&w=740&q=80"
        type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-dark bg-dark fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><i class="bi bi-heart-fill"></i> Wedding Pass</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar"
                    aria-labelledby="offcanvasDarkNavbarLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Menu</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                            aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                            <li class="nav-item">
                                <a class="nav-link" href="Dashboard.html"><i class="bi bi-grid"></i> Dashboard</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="receptionCheck-in.html"><i class="bi bi-person-check"></i> Reception Check-in</a>
                            </li>
                            <li class="nav-item">
                                <!-- BUG CORRIGIDO: O botão de logout chamava logout() mas o script não estava carregado ainda -->
                                <a class="nav-link" onclick="logout()" style="cursor:pointer;">
                                    <i class="bi bi-box-arrow-right"></i> Sair
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <h1 style="margin-top: 100px; text-align: center;">
            Reception Check-in
        </h1>

        <div class="container" style="margin-top: 30px;">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-body">
                        <!-- BUG CORRIGIDO: O campo de busca não tinha id e não estava ligado a nenhuma função.
                             Agora tem id="campoBusca" e chama filtrarConvidados() ao digitar. -->
                        <input
                            class="form-control"
                            type="search"
                            id="campoBusca"
                            placeholder="Buscar por nome..."
                            oninput="filtrarConvidados()"
                        />
                    </div>
                </div>
            </div>
        </div>

        <div class="container" style="margin-top: 20px;">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-sm">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Nome</th>
                                        <th>Telefone</th>
                                        <th>Mesa</th>
                                        <th>Status</th>
                                        <th>Ação</th>
                                    </tr>
                                </thead>
                                <tbody id="results">
                                    <!-- Linhas carregadas pelo JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts carregados no final para garantir que o HTML esteja pronto -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/loggout.js"></script>
    <script src="../js/getGuestsReception.js"></script>
</body>

</html>
